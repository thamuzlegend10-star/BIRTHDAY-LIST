<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Minerafter&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <audio id="mc-click-sound" src="./audio/mc.mp3" preload="auto"></audio>

    <main class="app-shell">
      <section class="hero-card">
        <p class="eyebrow">Upcoming birthday reminders</p>
        <h1>Celebrate soon</h1>
        <p class="hero-copy">
          A clean view of birthdays arriving in the next 7 days.
        </p>
        <div class="date-pill mc-btn" id="today-label">Loading date...</div>
      </section>

      <section class="list-card">
        <div class="section-heading">
          <h2>Coming up this week</h2>
          <span class="muted">Within 7 days</span>
        </div>
        <div id="birthday-list" class="birthday-list"></div>
      </section>

      <section class="music-card">
        <iframe 
          width="100%" 
          height="180" 
          src="https://www.youtube.com/embed/mukiMaOSLEs" 
          title="C418 - Wet Hands (Minecraft Soundtrack)" 
          frameborder="0" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
          referrerpolicy="strict-origin-when-cross-origin" 
          allowfullscreen>
        </iframe>
      </section>
    </main>

    <script src="birthdays.js"></script>
    <script src="script.js"></script>
  </body>
</html>
