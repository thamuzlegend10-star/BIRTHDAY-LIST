<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Minerafter&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <!-- Hero Section -->
      <section class="hero-card">
        <p class="eyebrow">Upcoming birthday reminders</p>
        <h1>Celebrate soon</h1>
        <p class="hero-copy">
          A clean view of birthdays arriving in the next 7 days.
        </p>
        <div class="date-pill" id="today-label">Loading date...</div>
      </section>

      <!-- Birthday List Section -->
      <section class="list-card">
        <div class="section-heading">
          <h2>Coming up this week</h2>
          <span class="muted">Within 7 days</span>
        </div>
        <div id="birthday-list" class="birthday-list"></div>
      </section>

      <!-- Music Player Section -->
      <section class="music-card">
        <iframe 
          data-testid="embed-iframe" 
          style="border-radius:12px;" 
          src="https://open.spotify.com/embed/playlist/1ZNIetyhnoL6lS5KeFYlrb?utm_source=generator&si=c782b5cfb16f45f9" 
          width="100%" 
          height="352" 
          frameBorder="0" 
          allowfullscreen="" 
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
          loading="lazy">
        </iframe>
      </section>
    </main>

    <!-- JavaScript Files -->
    <script src="birthdays.js"></script>
    <script src="script.js"></script>
  </body>
</html>
